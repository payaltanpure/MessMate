{% extends 'base.html' %}

{% block title %}Edit Mess - SMARTMESS AI{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Edit Mess</h1>
            <p class="text-muted mb-0">Update mess details.</p>
        </div>
        <a href="{% url 'adminpanel:mess_detail' mess.id %}" class="btn btn-outline-secondary">Back to Details</a>
    </div>

    <div class="card glass-card border-0">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    {% for field in form %}
                        <div class="col-md-6">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field.errors }}
                            {{ field }}
                        </div>
                    {% endfor %}
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-gradient">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
