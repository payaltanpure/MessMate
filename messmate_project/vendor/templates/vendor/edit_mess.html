{% extends "base.html" %}

{% block title %}Edit Mess - SMARTMESS AI{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card glass-card border-0 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'manage_mess' %}" class="btn btn-sm btn-outline-secondary rounded-circle me-3" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h1 class="h3 mb-0"><i class="bi bi-pencil-square gradient-text me-2"></i>Edit Mess: {{ mess.mess_name }}</h1>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <!-- Basic Info -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Mess Name</label>
                            <input type="text" name="mess_name" value="{{ mess.mess_name }}" class="form-control rounded-3 bg-body-tertiary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Contact Number</label>
                            <input type="text" name="contact_number" value="{{ mess.contact_number }}" class="form-control rounded-3 bg-body-tertiary" required>
                        </div>
                        
                        <!-- Location -->
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Full Address</label>
                            <input type="text" name="address" value="{{ mess.address }}" class="form-control rounded-3 bg-body-tertiary" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Location Name (Landmark)</label>
                            <input type="text" name="location_name" value="{{ mess.location_name }}" class="form-control rounded-3 bg-body-tertiary">
                        </div>

                        <!-- Diet & Distance -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Diet Type</label>
                            <select name="diet_type" class="form-select rounded-3 bg-body-tertiary">
                                <option value="veg" {% if mess.diet_type == 'veg' %}selected{% endif %}>Veg Only</option>
                                <option value="non-veg" {% if mess.diet_type == 'non-veg' %}selected{% endif %}>Non-Veg Only</option>
                                <option value="both" {% if mess.diet_type == 'both' %}selected{% endif %}>Veg & Non-Veg</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Distance from Hostel (km)</label>
                            <input type="number" step="0.1" name="distance" value="{{ mess.distance }}" class="form-control rounded-3 bg-body-tertiary">
                        </div>
                        
                        <!-- Pricing (Subscriptions) -->
                        <div class="col-12 mt-4">
                            <h4 class="h6 border-bottom pb-2">Pricing Plans (Monthly)</h4>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Lunch Only Plan</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-tertiary">Rs.</span>
                                <input type="number" name="monthly_price_lunch" value="{{ mess.monthly_price_lunch }}" class="form-control rounded-3 bg-body-tertiary" placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Dinner Only Plan</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-tertiary">Rs.</span>
                                <input type="number" name="monthly_price_dinner" value="{{ mess.monthly_price_dinner }}" class="form-control rounded-3 bg-body-tertiary" placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Both (Lunch+Dinner)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-tertiary">Rs.</span>
                                <input type="number" name="monthly_price_both" value="{{ mess.monthly_price_both }}" class="form-control rounded-3 bg-body-tertiary" placeholder="0.00">
                            </div>
                        </div>

                        <!-- Tiffin Pricing -->
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Daily Tiffin Price</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-tertiary">Rs.</span>
                                <input type="number" name="daily_tiffin_price" value="{{ mess.daily_tiffin_price }}" class="form-control rounded-3 bg-body-tertiary" placeholder="0.00">
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="col-12">
                            <label class="form-label small fw-bold">Description</label>
                            <textarea name="description" class="form-control rounded-3 bg-body-tertiary" rows="3">{{ mess.description }}</textarea>
                        </div>
                        
                        <!-- Submit -->
                        <div class="col-12 mt-4 text-end">
                            <a href="{% url 'manage_mess' %}" class="btn btn-outline-secondary rounded-pill px-4 me-2">Cancel</a>
                            <button type="submit" class="btn btn-gradient rounded-pill px-4"><i class="bi bi-save me-1"></i> Update Mess</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
