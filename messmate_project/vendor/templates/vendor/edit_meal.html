{% extends "base.html" %}

{% block title %}Edit Meal - SMARTMESS AI{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card glass-card border-0 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'manage_meals' meal.mess.id %}" class="btn btn-sm btn-outline-secondary rounded-circle me-3" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h1 class="h3 mb-0"><i class="bi bi-pencil-square gradient-text me-2"></i>Edit Meal</h1>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Meal Name / Title</label>
                            <input type="text" name="name" value="{{ meal.name }}" class="form-control rounded-3 bg-body-tertiary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Meal Type</label>
                            <select name="meal_type" class="form-select rounded-3 bg-body-tertiary" required>
                                <option value="breakfast" {% if meal.meal_type == 'breakfast' %}selected{% endif %}>Breakfast</option>
                                <option value="lunch" {% if meal.meal_type == 'lunch' %}selected{% endif %}>Lunch</option>
                                <option value="dinner" {% if meal.meal_type == 'dinner' %}selected{% endif %}>Dinner</option>
                            </select>
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Menu Items</label>
                            <textarea name="menu_items" class="form-control rounded-3 bg-body-tertiary" rows="3" required>{{ meal.menu_items }}</textarea>
                            <div class="form-text">List the exact contents to help students decide.</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Price per Plate</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-tertiary">Rs.</span>
                                <input type="number" step="0.01" name="price" value="{{ meal.price }}" class="form-control rounded-3 bg-body-tertiary" required>
                            </div>
                        </div>

                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check form-switch fs-5 mb-1">
                                <input class="form-check-input" type="checkbox" role="switch" name="is_available" id="is_available" {% if meal.is_available %}checked{% endif %}>
                                <label class="form-check-label fs-6" for="is_available">Currently Available</label>
                            </div>
                        </div>
                        
                        <div class="col-12 mt-4 text-end">
                            <a href="{% url 'manage_meals' meal.mess.id %}" class="btn btn-outline-secondary rounded-pill px-4 me-2">Cancel</a>
                            <button type="submit" class="btn btn-gradient rounded-pill px-4"><i class="bi bi-save me-1"></i> Update Meal</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
