{% extends "base.html" %}

{% block title %}SMARTMESS AI - Reset Password Request{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card glass-card p-5 border-0">
                <div class="text-center mb-4">
                    <i class="bi bi-question-circle-fill gradient-text display-4 mb-2"></i>
                    <h1 class="h3 font-family-title">Forgot Password</h1>
                    <p class="text-secondary small">Enter your email and we'll generate a mock reset link</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="email" class="form-label small fw-bold">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control rounded-3" placeholder="name@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 rounded-pill py-2">Generate Reset Link</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="small text-decoration-none">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
