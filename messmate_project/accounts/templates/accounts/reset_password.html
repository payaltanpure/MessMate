{% extends "base.html" %}

{% block title %}SMARTMESS AI - Reset Password{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card glass-card p-5 border-0">
                <div class="text-center mb-4">
                    <i class="bi bi-key-fill gradient-text display-4 mb-2"></i>
                    <h1 class="h3 font-family-title">Reset Password</h1>
                    <p class="text-secondary small">Set a new password for your account</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold">New Password</label>
                        <input type="password" id="password" name="password" class="form-control rounded-3" placeholder="Min 6 characters" required>
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 rounded-pill py-2">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
